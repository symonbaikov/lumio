# Development docker-compose override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postgres:
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    volumes:
      - redis_dev_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    environment:
      - NODE_ENV=development
      - JWT_SECRET=finflow-dev-jwt-secret-do-not-use-in-production-abc123
      - JWT_REFRESH_SECRET=finflow-dev-jwt-refresh-secret-do-not-use-in-production-xyz789
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    command: sh -lc "NODE_OPTIONS=--max-old-space-size=2048 npm run migration:run:dev && NODE_OPTIONS=--max-old-space-size=2048 npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    environment:
      - NODE_ENV=development
      - API_PROXY_TARGET=http://backend:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_dev_data:
  redis_dev_data:
